spring.application.name=contact-management
# Comma-separated origins for browsers (React dev server); required when using session cookies cross-origin (fetch credentials: include)
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
spring.datasource.url=jdbc:postgresql://localhost:5432/contact_management
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=8080

logging.level.root=INFO
logging.level.com.contactmanagement=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN